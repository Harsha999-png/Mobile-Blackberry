<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackBerry Curve 2 Emulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blackberry-curve-2">
        <div class="top-bar"></div>
        <div class="screen">
            <div class="status-bar">
                <span class="signal">||||</span>
                <span class="time">12:00</span>
                <span class="battery">100%</span>
            </div>
            <div class="content">
		<div class="homescreen">
                    <img src="1.jpg?height=220&width=320" alt="BlackBerry Homescreen" class="homescreen-image">
                <ul class="menu">
                    <li>Messages</li>
                    <li>Contacts</li>
                    <li>Browser</li>
                    <li>Media</li>
                </ul>
		</div>
            </div>
        </div>
        <div class="navigation">
          <img src="call.png" alt="call" class="call">
	 <button class= "menu" aria-label="Menu"><img src="blackberry.png" alt="Blackberry"></button>            
	 <div class="trackpad" aria-label="Trackpad"></div>
	 <button class= "back" aria-label="Back"><img src="back-arrow.png" alt="back"></button>
	<button class= "end" aria-label="End"><img src="phone-call-end.png" alt="end"></button>            
        </div>
        <div class="keyboard">
            <div class="row">
                <button>Q</button><button>W</button><button>E</button><button>R</button><button>T</button><button>Y</button><button>U</button><button>I</button><button>O</button><button>P</button>
            </div>
            <div class="row">
                <button>A</button><button>S</button><button>D</button><button>F</button><button>G</button><button>H</button><button>J</button><button>K</button><button>L</button>
            </div>
            <div class="row">
                <button class="wide">Shift</button><button>Z</button><button>X</button><button>C</button><button>V</button><button>B</button><button>N</button><button>M</button><button class="wide">Del</button>
            </div>
            <div class="row">
                <button class="wide">Alt</button><button>@</button><button class="extra-wide">Space</button><button>.</button><button class="wide">Enter</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
